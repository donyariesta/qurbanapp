services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: qurban-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - composer_vendor:/var/www/vendor
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-qurban}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: qurban-web
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www:ro
      - composer_vendor:/var/www/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  frontend:
    image: node:20-alpine
    container_name: qurban-frontend
    working_dir: /var/www
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    environment:
      VITE_PORT: ${VITE_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: qurban-db
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-qurban}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-qurban}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  composer_vendor:
  node_modules:
  postgres_data:
